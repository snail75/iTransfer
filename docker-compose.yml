services:
  mediapult-transfer:
    image: itransfer-backend:latest
    # Build the local image with: docker build -t itransfer-backend .
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      PORT: 3000
      DATA_DIRECTORY: /data
      UPLOAD_DIRECTORY: /data/uploads/shares
      DATABASE_URL: file:/data/mediapult-transfer.db?connection_limit=1
    volumes:
      - "./data:/data:Z"
  #      - "./config.yaml:/opt/app/config.yaml:ro,Z" # Add this line, if you want to configure mediapult-transfer via config file and not via UI

  # To add ClamAV, extend this compose file with a ClamAV service and set CLAMAV_HOST.
