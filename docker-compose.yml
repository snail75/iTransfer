services:
  mediapult-transfer:
    image: mediapult-transfer:latest
    # Build the local image with: docker build -t mediapult-transfer .
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      - TRUST_PROXY=false # Set to true if a reverse proxy is in front of the container
    volumes:
      - "./data:/opt/app/backend/data:Z"
      - "./data/images:/opt/app/frontend/public/img:Z"
  #      - "./config.yaml:/opt/app/config.yaml" # Add this line, if you want to configure mediapult-transfer via config file and not via UI

  # To add ClamAV, extend this compose file with a ClamAV service and set CLAMAV_HOST.
